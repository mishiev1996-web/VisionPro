<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VisionPro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--bg2:#0e0e10;--card:#1c1c1e;--card2:#26262a;--line:#2e2e32;
  --ink:#f5f5f7;--ink2:#98989f;--ink3:#636368;
  --cyan:#10b981;--violet:#047857;--green:#30d158;--red:#ff453a;--amber:#ffd60a;
  --cardborder:rgba(255,255,255,.07);--sheetline:rgba(255,255,255,.08);
  --r:16px;--grad:linear-gradient(135deg,var(--cyan),var(--violet));
  --mono:ui-monospace,'SF Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.32,.72,0,1);
}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:12px;padding-bottom:80px;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background:
    radial-gradient(ellipse 50% 80% at 85% 70%,rgba(16,185,129,.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 95% 30%,rgba(5,150,105,.14) 0%,transparent 60%),
    linear-gradient(180deg,#071a12 0%,#0a2a1c 50%,#071a12 100%)}
body::before{content:"";position:fixed;z-index:-1;top:-20%;right:-10%;width:60vmax;height:80vmax;
  background:radial-gradient(ellipse 100% 100% at 70% 50%,rgba(16,185,129,.18) 0%,rgba(5,150,105,.08) 30%,transparent 65%);
  filter:blur(60px);opacity:.7;pointer-events:none;animation:silkDrift 20s ease-in-out infinite alternate}
body::after{content:"";position:fixed;z-index:-1;bottom:0;right:0;width:50vmax;height:60vmax;
  background:radial-gradient(ellipse 80% 100% at 80% 80%,rgba(16,185,129,.15) 0%,rgba(4,120,87,.06) 40%,transparent 70%);
  filter:blur(50px);opacity:.6;pointer-events:none;animation:silkDrift2 25s ease-in-out infinite alternate}
@keyframes silkDrift{0%{transform:translate(0,0) rotate(0deg) scale(1)}100%{transform:translate(-3vmax,4vmax) rotate(2deg) scale(1.05)}}
@keyframes silkDrift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(2vmax,-3vmax) scale(1.08)}}
.golden-particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.golden-particles span{position:absolute;width:2px;height:2px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.9) 0%,rgba(212,175,55,0) 70%);
  box-shadow:0 0 6px 2px rgba(212,175,55,.3);animation:floatParticle linear infinite}
@keyframes floatParticle{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Header */
.hdr{text-align:center;padding:8px 0 12px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.hdr h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:10px;color:var(--ink3);margin-top:2px;letter-spacing:.5px}

/* Nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(10,10,12,.72);backdrop-filter:saturate(180%) blur(28px);-webkit-backdrop-filter:saturate(180%) blur(28px);border-top:1px solid var(--sheetline);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
nav button{flex:1;background:none;border:none;color:var(--ink3);padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;font-family:inherit;text-transform:uppercase;letter-spacing:.5px;transition:color .25s var(--ease);position:relative;min-height:48px;justify-content:center}
nav button svg{width:20px;height:20px;stroke-width:1.8;transition:transform .35s var(--spring)}
nav button.on{color:var(--cyan)}
nav button.on svg{transform:scale(1.08) translateY(-1px)}
nav button.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--cyan);border-radius:0 0 2px 2px}

/* Cards */
.card{background:rgba(255,255,255,.05);border:none;border-radius:20px;padding:16px;margin-bottom:10px}
.card-t{font-size:10px;font-weight:600;letter-spacing:-.01em;color:var(--ink2);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* Input */
.inp{width:100%;background:var(--card);border:1px solid var(--cardborder);border-radius:12px;padding:12px;font-size:14px;color:var(--ink);outline:none;transition:border-color .25s var(--ease)}
.inp:focus{border-color:var(--cyan)}
.inp::placeholder{color:var(--ink3)}
.fgrp{margin-bottom:10px}
.fgrp label{display:block;font-size:9px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* Button */
.btn{width:100%;padding:13px;border:none;border-radius:980px;background:var(--cyan);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:default}
.btn::before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 32%,rgba(255,255,255,.3) 50%,transparent 68%);transform:translateX(-130%);animation:shine 3.6s ease-in-out infinite;pointer-events:none}
@keyframes shine{0%,55%{transform:translateX(-130%)}85%,100%{transform:translateX(130%)}}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--cardborder);color:var(--ink)}
.btn-sm{width:auto;padding:8px 14px;font-size:11px;border-radius:980px;min-height:34px}
.btn-sm::before{display:none}
.btn-tint{background:rgba(16,185,129,.14);color:var(--cyan);border:none}
.btn-tint::before{display:none}

/* Match card */
.mc{padding:12px 0;border-bottom:1px solid var(--sheetline);cursor:pointer;transition:background .15s}
.mc:last-child{border-bottom:none}
.mc:active{background:rgba(16,185,129,.05)}
.mc-top{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);margin-bottom:6px}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;font-size:13px}
.mc-home{text-align:right;font-weight:700}
.mc-away{font-weight:700}
.mc-score{text-align:center;font-family:var(--mono);font-weight:800;background:var(--card2);padding:4px 10px;border-radius:8px;font-size:11px;border:1px solid var(--cardborder);min-width:50px}
.mc-bar{display:flex;height:5px;border-radius:980px;overflow:hidden;margin-top:8px;gap:1px}
.mc-bar div{transition:width .3s}
.mc-bar .h{background:var(--green)}.mc-bar .d{background:var(--amber)}.mc-bar .a{background:var(--red)}
.mc-pct{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums}
.mc-pct .h{color:var(--green)}.mc-pct .d{color:var(--amber)}.mc-pct .a{color:var(--red)}
.mc-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:8px;font-weight:600;padding:2px 6px;border-radius:980px;text-transform:uppercase}
.tag-over{background:rgba(4,120,87,.12);color:var(--violet)}
.tag-under{background:rgba(13,148,136,.08);color:var(--cyan)}
.tag-btts{background:rgba(16,185,129,.12);color:var(--cyan)}
.tag-conf{background:rgba(16,185,129,.12);color:#10b981}
.tag-conf.low{background:rgba(10,74,61,.1);color:#0a6b57}

/* League chips */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 14px;border-radius:980px;font-size:11px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid var(--cardborder);color:var(--ink2);cursor:pointer;flex-shrink:0;transition:all .25s var(--ease)}
.chip.on{background:var(--cyan);color:#fff;border-color:transparent}

/* Modal */
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.modal.open{display:flex}
.modal-body{background:var(--card);border:1px solid var(--cardborder);border-radius:24px 24px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:8px 16px 32px;animation:su .4s var(--spring)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.modal-h{width:36px;height:5px;border-radius:980px;background:var(--line);margin:8px auto 14px}

/* Prob display */
.prob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:12px 0}
.prob-item{text-align:center;padding:14px 4px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--cardborder)}
.prob-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);font-weight:700}
.prob-item .val{font-size:24px;font-weight:800;font-family:var(--mono);margin-top:2px;font-variant-numeric:tabular-nums}
.prob-item.best{border:2px solid var(--cyan)}

/* Analysis */
.ai-text{font-size:14px;line-height:1.65;color:var(--ink);white-space:pre-wrap;margin-top:10px;letter-spacing:-.008em}
.pred-box{margin-top:14px;background:var(--card2);border:none;border-left:4px solid var(--cyan);border-radius:16px;padding:16px 16px 16px 20px;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.18),0 0 0 1px var(--cardborder)}
.pred-box.conf-high{border-left-color:#10b981;box-shadow:0 4px 20px rgba(16,185,129,.12),0 0 0 1px rgba(16,185,129,.18)}
.pred-box.conf-medium{border-left-color:#0d9273;box-shadow:0 4px 20px rgba(13,146,115,.1),0 0 0 1px rgba(13,146,115,.15)}
.pred-box.conf-low{border-left-color:#0a6b57;box-shadow:0 4px 20px rgba(10,107,87,.08),0 0 0 1px rgba(10,107,87,.12)}
.pred-box.conf-very-low{border-left-color:#0a4a3d;box-shadow:0 4px 20px rgba(10,74,61,.06),0 0 0 1px rgba(10,74,61,.1)}
.pred-box .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pred-box .lbl .pred-icon{font-size:14px;line-height:1}
.pred-box .txt{font-size:16px;font-weight:700;line-height:1.4;letter-spacing:-.02em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pred-box .conf{text-align:right;margin-top:8px}
.conf-gauge{display:flex;align-items:center;gap:8px;margin-top:8px}
.conf-gauge-track{flex:1;height:4px;background:var(--line);border-radius:980px;overflow:hidden}
.conf-gauge-fill{height:100%;border-radius:980px;transition:width .8s var(--ease)}
.conf-gauge-fill.g-high{background:linear-gradient(90deg,#059669,#10b981)}
.conf-gauge-fill.g-medium{background:linear-gradient(90deg,#0a7d62,#0d9273)}
.conf-gauge-fill.g-low{background:linear-gradient(90deg,#085c4a,#0a6b57)}
.conf-gauge-fill.g-very-low{background:linear-gradient(90deg,#073d33,#0a4a3d)}
.conf-gauge-label{font-size:10px;font-weight:600;min-width:80px;text-align:right}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--cyan);border-radius:50%;animation:sp .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Standings */
table{width:100%;border-collapse:collapse;font-size:11px}
th{color:var(--ink3);font-size:8px;font-weight:700;text-transform:uppercase;padding:6px 4px;text-align:left;border-bottom:1px solid var(--sheetline)}
td{padding:6px 4px;border-bottom:1px solid var(--sheetline)}
.num{font-family:var(--mono);text-align:right}
.pos{font-family:var(--mono);font-weight:700;text-align:center;width:22px;color:var(--ink3)}
.cl td{color:var(--green)}.rel td{color:var(--red)}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stat{text-align:center;padding:10px 4px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--cardborder)}
.stat .v{font-size:18px;font-weight:800;font-family:var(--mono);background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .l{font-size:8px;color:var(--ink3);text-transform:uppercase;margin-top:2px;font-weight:600}

/* Accuracy */
.acc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--sheetline);font-size:11px}
.acc-bar{flex:1;margin:0 10px;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.acc-fill{height:100%;border-radius:2px;transition:width .6s}
.acc-pct{font-family:var(--mono);font-weight:700;min-width:36px;text-align:right}

/* Autocomplete */
.ac{position:absolute;left:0;right:0;top:100%;z-index:20;background:var(--card);border:1px solid var(--cardborder);border-radius:14px;margin-top:4px;display:none;max-height:160px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.ac.open{display:block}
.ac-item{padding:10px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--sheetline)}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:rgba(16,185,129,.08)}
.ac-item .lg{font-size:9px;color:var(--ink3);margin-left:6px}

/* Search */
.search-wrap{position:relative}
.search{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--sheetline);border-radius:12px;padding:10px 12px 10px 36px;font-size:13px;color:var(--ink);outline:none}
.search:focus{border-color:var(--cyan)}
.search::placeholder{color:var(--ink3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink3)}

/* Sections */
.sec{display:none}.sec.on{display:block}

/* Prematch */
.pm-progress{background:var(--sheetline);border-radius:6px;height:6px;overflow:hidden;margin:8px 0}
.pm-bar{height:100%;background:var(--grad);border-radius:6px;transition:width .5s}
</style>
</head>
<body>
<div class="golden-particles" id="goldenParticles"></div>

<div class="hdr">
  <h1>Vision<span class="grad-text">Pro</span></h1>
  <p>xG · Elo · ML · 108 признаков</p>
</div>

<!-- ═══ ANALYSIS ═══ -->
<div class="sec on" id="s-analysis">
  <div class="card">
    <div class="card-t">AI Анализ матча</div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:end">
      <div><label>Хозяева</label>
        <div class="search-wrap"><input class="inp" id="ai-home" placeholder="Arsenal" autocomplete="off" style="font-size:13px"><div class="ac" id="ac-home"></div></div>
      </div>
      <div style="font-size:16px;font-weight:900;color:var(--ink3);padding-bottom:10px">VS</div>
      <div><label>Гости</label>
        <div class="search-wrap"><input class="inp" id="ai-away" placeholder="Chelsea" autocomplete="off" style="font-size:13px"><div class="ac" id="ac-away"></div></div>
      </div>
    </div>
    <button class="btn" id="ai-btn" disabled onclick="runAnalysis()">Получить прогноз</button>
  </div>

  <div class="card" id="ai-loading" style="display:none"><div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><div><div style="font-weight:600;font-size:12px" id="ai-load-msg">Поиск команд...</div><div style="font-size:10px;color:var(--ink3);margin-top:2px" id="ai-load-sub"></div></div></div></div>

  <div id="ai-result" style="display:none">
    <div id="ai-prob-display"></div>
    <div id="ai-text-block"></div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn btn-tint btn-sm" id="ai-save-btn" onclick="savePrediction()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ═══ PREMATCH ═══ -->
<div class="sec" id="s-prematch">
  <div class="card">
    <div class="card-t">Предматчевый анализ</div>
    <p style="font-size:11px;color:var(--ink2);margin-bottom:10px">Матчи на сегодня из sstats.net</p>
    <button class="btn" id="pm-load-btn" onclick="loadTodayMatches()">Матчи на сегодня</button>
  </div>
  <div id="pm-loading" style="display:none" class="card"><div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><span style="font-size:12px;color:var(--ink2)">Загрузка матчей...</span></div></div>
  <div id="pm-list"></div>
  <div id="pm-detail" style="display:none"></div>
</div>

<!-- ═══ ACCURACY ═══ -->
<div class="sec" id="s-accuracy">
  <div class="card">
    <div class="card-t">Точность модели</div>
    <div id="acc-body"><div style="text-align:center;padding:16px"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-body" onclick="event.stopPropagation()">
    <div class="modal-h"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<nav>
  <button class="on" onclick="show('analysis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    Анализ
  </button>
  <button onclick="show('prematch')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Предматч
  </button>
  <button onclick="show('accuracy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    Точность
  </button>
</nav>

<script>
const TG = window.Telegram?.WebApp;
if(TG){
  TG.ready();TG.expand();
  const sai=TG.safeAreaInset||{};
  if(sai.top)document.body.style.paddingTop=sai.top+'px';
  if(sai.bottom)document.querySelector('nav').style.paddingBottom=sai.bottom+'px';
  if(TG.BackButton){TG.BackButton.show();TG.BackButton.onClick(()=>{closeModal();backFromDetail()})}
}

// ── Theme from Telegram ──
if(TG?.themeParams){
  const t=TG.themeParams;
  if(t.bg_color)document.documentElement.style.setProperty('--bg',t.bg_color);
  if(t.secondary_bg_color)document.documentElement.style.setProperty('--surface',t.secondary_bg_color);
  if(t.text_color)document.documentElement.style.setProperty('--text',t.text_color);
  if(t.hint_color)document.documentElement.style.setProperty('--text3',t.hint_color);
  if(t.accent_text_color)document.documentElement.style.setProperty('--cyan',t.accent_text_color);
  if(t.button_color)document.documentElement.style.setProperty('--card',t.button_color);
}

// ── Tab switching ──
function show(name){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('on',['analysis','prematch','accuracy'][i]===name));
  if(name==='accuracy')loadAccuracy();
}

// ── Autocomplete ──
const aiHome=document.getElementById('ai-home'),aiAway=document.getElementById('ai-away');
[aiHome,aiAway].forEach((inp,idx)=>{
  let timer;
  inp.addEventListener('input',()=>{
    clearTimeout(timer);
    document.getElementById('ai-btn').disabled=!(aiHome.value&&aiAway.value);
    const v=inp.value.trim();
    const ac=document.getElementById(idx===0?'ac-home':'ac-away');
    if(v.length<2){ac.classList.remove('open');return}
    timer=setTimeout(async()=>{
      try{
        const r=await fetch(API+`/api/ai/search-db?q=${encodeURIComponent(v)}`);
        const data=await r.json();
        const results=data.results||[];
        if(!results.length){ac.classList.remove('open');return}
        ac.innerHTML=results.map(t=>`<div class="ac-item" onclick="selectTeam(${idx},'${(t.name||'').replace(/'/g,"\\'")}')">${t.name}<span class="lg">${t.league_slug||''}</span></div>`).join('');
        ac.classList.add('open');
      }catch(e){}
    },300);
  });
});
function selectTeam(idx,name){
  [aiHome,aiAway][idx].value=name;
  document.getElementById(idx===0?'ac-home':'ac-away').classList.remove('open');
  document.getElementById('ai-btn').disabled=!(aiHome.value&&aiAway.value);
}

// ── API base ──
const API=location.origin;
const INITDATA=TG?.initData||'';

// ── Analysis ──
async function runAnalysis(){
  const h=aiHome.value.trim(),a=aiAway.value.trim();if(!h||!a)return;
  document.getElementById('ai-loading').style.display='block';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ai-btn').disabled=true;
  try{
    const r=await fetch(API+'/api/ai/search-and-predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({home_name:h,away_name:a,init_data:INITDATA})});
    const data=await r.json();
    renderAnalysis(data);
    if(TG?.HapticFeedback)TG.HapticFeedback.notificationOccurred('success');
  }catch(e){
    document.getElementById('ai-text-block').innerHTML=`<div class="card" style="color:var(--red);text-align:center">Ошибка: ${e.message}</div>`;
    document.getElementById('ai-result').style.display='block';
  }
  document.getElementById('ai-loading').style.display='none';
  document.getElementById('ai-btn').disabled=false;
}

async function runPrematchAI(gameId){
  const btn=document.getElementById('pm-ai-btn');
  const loading=document.getElementById('pm-ai-loading');
  const result=document.getElementById('pm-ai-result');
  btn.disabled=true;btn.textContent='Запуск...';
  loading.style.display='block';result.style.display='none';
  const logEl=document.getElementById('pm-ai-log');
  const msgEl=document.getElementById('pm-ai-msg');
  logEl.innerHTML='';

  try{
    const r=await fetch(API+`/api/prematch/${gameId}/analyze`,{method:'POST'});
    const data=await r.json();
    if(!data.ok){throw new Error(data.detail||'Ошибка запуска')}

    // Stream progress via SSE (EventSource)
    await new Promise((resolve,reject)=>{
      const timeout=setTimeout(()=>{es.close();reject(new Error('Таймаут (120с)'))},120000);
      const es=new EventSource(API+'/api/collect/stream?since=0');
      es.onmessage=(e)=>{
        try{
          const ev=JSON.parse(e.data);
          if(ev.type==='info'&&ev.msg){
            msgEl.textContent=ev.msg;
            logEl.innerHTML+=`<div style="font-size:10px;color:var(--ink3)">${ev.msg}</div>`;
            logEl.scrollTop=logEl.scrollHeight;
          }
          if(ev.type==='result'&&ev.prediction){
            es.close();clearTimeout(timeout);
            resolve(ev.prediction);
          }
          if(ev.type==='error'){
            es.close();clearTimeout(timeout);
            reject(new Error(ev.msg));
          }
          if(ev.type==='done'){
            // Job finished, check for result
            es.close();clearTimeout(timeout);
            fetch(API+'/api/collect/status').then(r=>r.json()).then(st=>{
              if(st.result)resolve(st.result);
              else reject(new Error('Результат не получен'));
            });
          }
        }catch(pe){}
      };
      es.onerror=()=>{
        // Reconnect or give up after timeout
      };
    }).then(predData=>{
      renderPrematchAI(predData);
      const el=document.getElementById('pm-ai-result');
      if(el)el.style.cssText='display:block!important';
      if(TG?.HapticFeedback)TG.HapticFeedback.notificationOccurred('success');
    });
  }catch(e){
    result.innerHTML=`<div class="card" style="color:var(--red)">${e.message}</div>`;
    result.style.display='block';
  }
  loading.style.display='none';
  btn.disabled=false;btn.textContent='AI-анализ VisionPro';
}

// ── Helpers ──
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function confGaugeMini(confidenceStr){
  const s=(confidenceStr||'').toLowerCase();
  let level,pct,color,label,cls;
  if(s.includes('высок')||s.includes('high')){level='high';pct=85;color='#10b981';label='Высокая';cls='conf-high'}
  else if(s.includes('очень низк')||s.includes('very low')){level='very-low';pct=20;color='#0a4a3d';label='Очень низкая';cls='conf-very-low'}
  else if(s.includes('низк')||s.includes('low')){level='low';pct=35;color='#0a6b57';label='Низкая';cls='conf-low'}
  else{level='medium';pct=60;color='#0d9273';label='Средняя';cls='conf-medium'}
  return {html:`<div class="conf-gauge"><div class="conf-gauge-track"><div class="conf-gauge-fill g-${level}" style="width:${pct}%"></div></div><span class="conf-gauge-label" style="color:${color}">${label}</span></div>`,cls:cls};
}
